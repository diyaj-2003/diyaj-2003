<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
<title>GitHub profile banner for Diya Joseph</title>
<desc>White background with navy stripes, tall condensed bubble all-caps pink name</desc>

<defs>
  <linearGradient id="linepink" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#D4537E" stop-opacity="0"/>
    <stop offset="20%" stop-color="#D4537E"/>
    <stop offset="80%" stop-color="#D4537E"/>
    <stop offset="100%" stop-color="#D4537E" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="lineteal" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#1D9E75" stop-opacity="0"/>
    <stop offset="20%" stop-color="#1D9E75"/>
    <stop offset="80%" stop-color="#1D9E75"/>
    <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
  </linearGradient>
  <filter id="bubble">
    <feMorphology operator="dilate" radius="2.5"/>
  </filter>
  <clipPath id="clip">
    <rect width="680" height="300"/>
  </clipPath>
</defs>

<rect width="680" height="300" fill="#ffffff"/>

<g clip-path="url(#clip)">
  <rect y="0"   width="680" height="20" fill="#001F5B"/>
  <rect y="40"  width="680" height="20" fill="#001F5B"/>
  <rect y="80"  width="680" height="20" fill="#001F5B"/>
  <rect y="120" width="680" height="20" fill="#001F5B"/>
  <rect y="160" width="680" height="20" fill="#001F5B"/>
  <rect y="200" width="680" height="20" fill="#001F5B"/>
  <rect y="240" width="680" height="20" fill="#001F5B"/>
  <rect y="280" width="680" height="20" fill="#001F5B"/>
  <rect width="680" height="300" fill="#ffffff" opacity="0.8"/>
  <rect x="0" y="210" width="680" height="1.5" fill="url(#linepink)"/>
  <rect x="0" y="214" width="680" height="0.5" fill="url(#lineteal)"/>
</g>

<text x="340" y="185"
  font-family="'Arial Black', 'Arial Bold', 'Impact', sans-serif"
  font-size="148"
  font-weight="900"
  text-anchor="middle"
  fill="#F4C0D1"
  letter-spacing="-6"
  filter="url(#bubble)">DIYA</text>

<text x="340" y="185"
  font-family="'Arial Black', 'Arial Bold', 'Impact', sans-serif"
  font-size="148"
  font-weight="900"
  text-anchor="middle"
  fill="#D4537E"
  stroke="#ffffff"
  stroke-width="3"
  paint-order="stroke"
  letter-spacing="-6">DIYA</text>

<text x="340" y="252"
  font-family="'Arial Black', 'Arial Bold', 'Impact', sans-serif"
  font-size="62"
  font-weight="900"
  text-anchor="middle"
  fill="#F4C0D1"
  letter-spacing="18"
  filter="url(#bubble)">JOSEPH</text>

<text x="340" y="252"
  font-family="'Arial Black', 'Arial Bold', 'Impact', sans-serif"
  font-size="62"
  font-weight="900"
  text-anchor="middle"
  fill="#D4537E"
  stroke="#ffffff"
  stroke-width="2.5"
  paint-order="stroke"
  letter-spacing="18">JOSEPH</text>

<text x="340" y="278"
  font-family="'Courier New', monospace"
  font-size="9.5"
  text-anchor="middle"
  fill="#1D9E75"
  letter-spacing="3">BIOMEDICAL ENGINEER  ·  KCL  ·  CARDIAC MODELLING  ·  PIANIST</text>

</svg>
